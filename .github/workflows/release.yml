name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build app + DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          ./scripts/build-app.sh
          ./scripts/make-dmg.sh

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/NetBlocker-*.dmg
          generate_release_notes: true
